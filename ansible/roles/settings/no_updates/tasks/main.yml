---
- name: Disable Windows Update service
  ansible.windows.win_service:
    name: wuauserv
    start_mode: disabled
    state: stopped

- name: Disable Windows Update Medic service (prevents re-enabling)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\WaaSMedicSvc
    name: Start
    data: 4
    type: dword

- name: Disable automatic updates via registry
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
    name: NoAutoUpdate
    data: 1
    type: dword

- name: Disable Windows Update access entirely via policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate
    name: DisableWindowsUpdateAccess
    data: 1
    type: dword

- name: Disable delivery optimization
  ansible.windows.win_service:
    name: DoSvc
    start_mode: disabled
    state: stopped
  failed_when: false
